[workspace]
channels = ["https://repo.prefix.dev/meta-forge", "conda-forge"]
name = "lakeview"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[tasks]
dev = "uvicorn lakeview.app:app --host 0.0.0.0 --port 8766 --reload & cd frontend && bun run dev"
# Open the UI at the dev default prefix. Reads $LAKEVIEW_DEFAULT_PREFIX
# from the shell (set it in your .env + `source .env`, or via direnv).
open = "xdg-open \"http://localhost:5173/?prefix=${LAKEVIEW_DEFAULT_PREFIX:-}\""

[dependencies]
python = "=3.12"
lancedb = "*"
uvicorn = "*"
hatchling = "*"
obstore = "*"
fastapi = "*"
pillow = "*"

[pypi-dependencies]
lakeview = { path = ".", editable = true }
