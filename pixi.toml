[workspace]
channels = ["https://repo.prefix.dev/meta-forge", "conda-forge"]
name = "lakeview"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[tasks]
dev = "uvicorn lakeview.app:app --host 0.0.0.0 --port 8766 --reload & cd frontend && bun run dev"

[dependencies]
python = "=3.12"
lancedb = "*"
uvicorn = "*"
hatchling = "*"
obstore = "*"
fastapi = "*"
pillow = "*"
pydantic-settings = "*"

[pypi-dependencies]
lakeview = { path = ".", editable = true }
