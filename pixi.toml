[workspace]
channels = ["https://repo.prefix.dev/meta-forge", "conda-forge"]
name = "lakeview"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[tasks]
dev = "uvicorn lakeview.app:app --host 0.0.0.0 --port 8766 --reload & cd frontend && bun run dev"
# Open the UI at the dev default prefix. Picks up LAKEVIEW_DEFAULT_PREFIX
# from .env at the repo root (or the shell, if already exported).
open = "bash -c '[ -f .env ] && set -a && . ./.env && set +a; xdg-open \"http://localhost:5173/?prefix=$LAKEVIEW_DEFAULT_PREFIX\"'"

[dependencies]
python = "=3.12"
lancedb = "*"
uvicorn = "*"
hatchling = "*"
obstore = "*"
fastapi = "*"
pillow = "*"

[pypi-dependencies]
lakeview = { path = ".", editable = true }
