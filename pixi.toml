[workspace]
channels = ["https://repo.prefix.dev/meta-forge", "conda-forge"]
name = "lakeview"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[tasks]
dev = "uvicorn lakeview.app:app --host 0.0.0.0 --port 8766 --reload & cd frontend && bun run dev"
# Open the UI at the dev S3 prefix. Expects $S3_BUCKET and $S3_PREFIX in
# the shell env (via direnv + .env, or `source .env` before `pixi run`).
open = "xdg-open http://localhost:5173/?prefix=s3://$S3_BUCKET/$S3_PREFIX"
# Seed S3 with fixtures used by benches and plugin smoke tests.
seed = "python scripts/generate_test_data.py --target s3://$S3_BUCKET/$S3_PREFIX --fixture all"

[dependencies]
python = "=3.12"
lancedb = "*"
uvicorn = "*"
hatchling = "*"
obstore = "*"
fastapi = "*"
pillow = "*"
python-dotenv = "*"
python-magic = "*"

[pypi-dependencies]
lakeview = { path = ".", editable = true }

[feature.polaris.dependencies]
openjdk = "21.*"

[feature.polaris.tasks]
# One-shot: Polaris + Lakeview backend + frontend, single Ctrl+C tears down all.
lakeview-up = { cmd = "bash scripts/lakeview_up.sh" }
# One-shot Polaris only: build JAR if missing, launch, wait for health, bootstrap.
polaris-up = { cmd = "bash scripts/polaris_up.sh" }
# One-time: build the Quarkus JAR so polaris-up can skip the gradle dance.
polaris-build = { cmd = "./gradlew :polaris-server:assemble :polaris-server:quarkusAppPartsBuild", cwd = "../polaris" }

[environments]
polaris = ["polaris"]
